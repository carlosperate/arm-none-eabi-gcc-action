name: Check there is a new release available

# Toolchains now on Arm's GitLab. New releases are added to the README
# so when a release is added we expect a different latest commit in `main`.
env:
  LATEST_COMMIT_JSON: 'https://gitlab.arm.com/api/v4/projects/tooling%2Fgnu-toolchains-for-arm/repository/commits?ref_name=main&per_page=1'
  KNOWN_COMMIT: 'e7f7c9a1'

on:
  schedule:
    # Runs every day at 19:30
    - cron: '30 19 * * *'
  push:
    # On push only when this file is changed
    paths:
      - '.github/workflows/check-new-release.yml'

jobs:
  check-new-release:
    name: Check for a new release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: pip install requests
    - name: Check if the Arm GitLab main branch has a new commit
      shell: bash
      run: |
        python3 - << EOF
        import os, requests

        known = os.environ['KNOWN_COMMIT']
        latest = requests.get(os.environ['LATEST_COMMIT_JSON']).json()[0]['short_id']

        if latest != known:
            print(f'main branch changed: {latest} != known {known} - review the repo')
            raise SystemExit(1)
        print(f'No change. Latest commit is still {known}.')
        EOF
