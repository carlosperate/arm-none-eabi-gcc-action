name: 'arm-none-eabi-gcc GNU Arm Embedded Toolchain'
description: 'Install and set up the arm-none-eabi-gcc Arm compiler.'
author: 'Carlos Pereira Atencio'
inputs:
  release:
    description: 'GNU Embedded Toolchain for Arm release name (e.g. "10.3-2021.07").'
    default: 'latest'
    required: false
  path-env-var:
    description: 'Name for an environmental variable to be created with the toolchain path.'
    required: false
  use-cache:
    description: 'Save arm-none-eabi-gcc installation to GitHub Actions cache.'
    default: 'true'
    required: false
  use-tools-cache:
    description: 'Try to find arm-none-eabi-gcc installation in runner''s local tool cache before downloading from actions cache.'
    default: 'false'
    required: false
outputs:
  path:
    description: 'Path to the bin folder with the toolchain executables.'
runs:
  using: 'node24'
  main: 'dist/index.js'
branding:
  icon: 'cpu'
  color: 'blue'
